      .security { fill: #fff7ed; stroke: #f97316; stroke-width: 2; rx: 16; }
      .storage { fill: #ecfdf5; stroke: #10b981; stroke-width: 2; rx: 16; }
      .note { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 1.5; rx: 14; }
      .line { stroke: #2B579A; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .line2 { stroke: #6b7280; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-dasharray: 7 5; }
